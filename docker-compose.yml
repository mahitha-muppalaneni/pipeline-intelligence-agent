services:
  api:
    build: .
    ports: ["8000:8000"]
    env_file: .env
    volumes:
      - chroma:/app/.chroma_db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  ui:
    build: .
    command: streamlit run src/ui.py --server.port 8501 --server.address 0.0.0.0
    ports: ["8501:8501"]
    environment:
      API_URL: http://api:8000
    depends_on:
      api:
        condition: service_healthy

volumes:
  chroma: